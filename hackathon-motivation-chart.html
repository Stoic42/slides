<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WiE 黑客松女性内在动机对比</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f4ed;
    color: #141413;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .frame { max-width: 440px; width: 100%; }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6b6a64;
    margin-bottom: 0.4rem;
    font-family: monospace;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #141413;
  }
  .source {
    font-size: 0.75rem;
    color: #6b6a64;
    margin-bottom: 1.4rem;
    font-style: italic;
  }

  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 22px;
    gap: 12px;
  }
  .bar-label {
    width: 90px;
    flex-shrink: 0;
    font-size: 0.9rem;
    color: #3d3d3a;
    text-align: right;
  }
  .bar-track {
    flex: 1;
    height: 28px;
    background: #e8e6dc;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .bar-fill.wie { background: #df017e; }
  .bar-fill.mixed { background: #1B365D; }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: #3d3d3a;
  }
  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 2px;
  }
  .legend-dot.wie { background: #df017e; }
  .legend-dot.mixed { background: #1B365D; }

  .note-box {
    margin-top: 1rem;
    background: #fce4f0;
    border-left: 3px solid #df017e;
    padding: 9px 13px;
    font-size: 0.78rem;
    color: #3d3d3a;
    border-radius: 0 3px 3px 0;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="eyebrow">Intrinsic Motivation · University of Waterloo</div>
  <h1>WiE 黑客松 · 女性内在动机得分</h1>
  <p class="source">来源：University of Waterloo（满分 5 分）</p>

  <div class="bar-row">
    <div class="bar-label">WiE 专属赛</div>
    <div class="bar-track">
      <div class="bar-fill wie" style="width: 88%;">4.4 分</div>
    </div>
  </div>
  <div class="bar-row">
    <div class="bar-label">混合赛</div>
    <div class="bar-track">
      <div class="bar-fill mixed" style="width: 66%;">3.3 分</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot wie"></div><span>WiE 专属赛（女性）</span></div>
    <div class="legend-item"><div class="legend-dot mixed"></div><span>混合赛</span></div>
  </div>

  <div class="note-box">
    专属赛女性内在动机高出混合赛 <strong>33%</strong>（4.4 vs 3.3），
    说明专属空间显著提升参与动力与投入程度。
  </div>
</div>
</body>
</html>
