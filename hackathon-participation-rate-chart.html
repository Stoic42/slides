<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>女性专属 vs 混合黑客松参与率对比</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f4ed;
    color: #141413;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .frame { max-width: 640px; width: 100%; }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6b6a64;
    margin-bottom: 0.4rem;
    font-family: monospace;
  }
  h1 {
    font-size: 1.45rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #141413;
  }
  .source {
    font-size: 0.75rem;
    color: #6b6a64;
    margin-bottom: 1.6rem;
    font-style: italic;
  }

  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    gap: 14px;
  }
  .bar-label {
    width: 100px;
    flex-shrink: 0;
    font-size: 0.95rem;
    color: #3d3d3a;
    text-align: right;
  }
  .bar-track {
    flex: 1;
    height: 30px;
    background: #e8e6dc;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 12px;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .bar-fill.women { background: #df017e; }
  .bar-fill.mixed { background: #1B365D; }

  .legend {
    display: flex;
    gap: 24px;
    margin-top: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #3d3d3a;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .legend-dot.women { background: #df017e; }
  .legend-dot.mixed { background: #1B365D; }

  .caption {
    margin-top: 1.2rem;
    font-size: 0.75rem;
    color: #6b6a64;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="eyebrow">Hackathon Participation · Eindhoven University</div>
  <h1>女性专属 vs 混合赛 · 参与率对比</h1>
  <p class="source">来源：Eindhoven University of Technology</p>

  <div class="bar-row">
    <div class="bar-label">女性专属赛</div>
    <div class="bar-track">
      <div class="bar-fill women" style="width: 100%;">52.6%</div>
    </div>
  </div>
  <div class="bar-row">
    <div class="bar-label">混合赛</div>
    <div class="bar-track">
      <div class="bar-fill mixed" style="width: 41.8%;">22%</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot women"></div><span>女性专属赛</span></div>
    <div class="legend-item"><div class="legend-dot mixed"></div><span>混合赛（男女混合）</span></div>
  </div>

  <p class="caption">
    女性专属黑客松参与率 52.6%，混合赛仅 22%。专属空间大幅降低 Impostor Syndrome 带来的心理成本。
  </p>
</div>
</body>
</html>
